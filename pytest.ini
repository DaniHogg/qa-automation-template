[pytest]
pythonpath = src:.
minversion = 8.0
addopts = -ra -q --strict-markers --alluredir=allure-results
testpaths = tests
# "reference" is a template library — excluded from default runs.
# Run explicitly with: pytest tests/reference/
norecursedirs = .git .venv .pytest_cache allure-results screenshots reference
markers =
	web: web automation tests
	api: api tests
	mobile: mobile automation tests
	winapp: Windows desktop app tests (requires WinAppDriver on Windows)
	unit: framework-level tests that do not require an external test environment
	smoke: smoke coverage
	regression: regression coverage
